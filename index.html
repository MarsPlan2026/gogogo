<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>瞬息之间 (In Between) - 白底黑字版</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
        }
        #gameCanvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px rgba(0,0,0,0.08);
            cursor: pointer;
        }
        /* UI 叠加层 */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #000000;
            font-size: 20px;
            pointer-events: none;
            z-index: 10;
            font-weight: bold;
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #000000;
            z-index: 20;
            transition: opacity 0.3s;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            letter-spacing: 8px;
            text-align: center;
            color: #000000;
        }
        .desc {
            color: #555555;
            margin-bottom: 40px;
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
        }
        .btn {
            background: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 2px;
        }
        .btn:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div>SCORE: <span id="scoreText">0</span></div>
        <div style="font-size: 12px; color: #666666; margin-top: 5px;">BEST: <span id="bestText">0</span></div>
    </div>

    <div id="start-screen">
        <h1 id="title">IN BETWEEN</h1>
        <p class="desc" id="gameDesc">
            黑白瞬变，生死一线。<br><br>
            【规则】四周飞入黑白方块。<br>
            同色相融（得分），异色相克（GAME OVER）。<br><br>
            【操作】点击屏幕 或 按[空格键] 切换自身颜色。
        </p>
        <button class="btn" id="startBtn">START</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('startBtn');
        const scoreText = document.getElementById('scoreText');
        const bestText = document.getElementById('bestText');
        const titleText = document.getElementById('title');
        const descText = document.getElementById('gameDesc');

        // 游戏状态
        let gameState = 'START'; // START, PLAYING, GAMEOVER
        let score = 0;
        let highScore = localStorage.getItem('hb_high_score_v2') || 0;
        bestText.innerText = highScore;

        // 适配屏幕
        const GAME_SIZE = 600;
        canvas.width = GAME_SIZE;
        canvas.height = GAME_SIZE;

        function resizeCanvas() {
            const minDir = Math.min(window.innerWidth, window.innerHeight);
            if (minDir < GAME_SIZE) {
                canvas.style.width = minDir + 'px';
                canvas.style.height = minDir + 'px';
            } else {
                canvas.style.width = GAME_SIZE + 'px';
                canvas.style.height = GAME_SIZE + 'px';
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 玩家对象
        const player = {
            x: GAME_SIZE / 2,
            y: GAME_SIZE / 2,
            size: 30,
            color: 1, // 1 为白, 0 为黑
            angle: 0,
            rotSpeed: 0.04,
            pulse: 0,
            switch() {
                this.color = this.color === 1 ? 0 : 1;
                this.pulse = 15; // 切换时的视觉震荡
                createParticles(this.x, this.y, this.color === 1 ? '#cccccc' : '#000000', 8);
            },
            update() {
                this.angle += this.rotSpeed;
                if (this.pulse > 0) this.pulse--;
            },
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // 绘制外框（加强视觉）
                ctx.strokeStyle = this.color === 1 ? 'rgba(0,0,0,0.1)' : 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 2;
                ctx.strokeRect(-this.size - 5, -this.size - 5, this.size*2 + 10, this.size*2 + 10);

                // 核心方块
                ctx.fillStyle = this.color === 1 ? '#ffffff' : '#000000';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 3;
                
                const currentSize = this.size + this.pulse * 0.5;
                ctx.fillRect(-currentSize, -currentSize, currentSize * 2, currentSize * 2);
                ctx.strokeRect(-currentSize, -currentSize, currentSize * 2, currentSize * 2);
                
                ctx.restore();
            }
        };

        // 敌人（能量块）
        let enemies = [];
        let spawnTimer = 0;
        let baseSpawnRate = 90; // 越小生成越快
        let baseSpeed = 3;

        class Enemy {
            constructor() {
                this.color = Math.random() > 0.5 ? 1 : 0;
                this.size = 16;
                
                // 从屏幕外四周随机潜入
                const side = Math.floor(Math.random() * 4);
                if (side === 0) { // 上
                    this.x = Math.random() * GAME_SIZE;
                    this.y = -this.size;
                } else if (side === 1) { // 右
                    this.x = GAME_SIZE + this.size;
                    this.y = Math.random() * GAME_SIZE;
                } else if (side === 2) { // 下
                    this.x = Math.random() * GAME_SIZE;
                    this.y = GAME_SIZE + this.size;
                } else { // 左
                    this.x = -this.size;
                    this.y = Math.random() * GAME_SIZE;
                }

                // 计算飞向中心的向量
                const angle = Math.atan2(GAME_SIZE/2 - this.y, GAME_SIZE/2 - this.x);
                // 动态速度：随分数增加而变态变快
                const speedMod = baseSpeed + (score * 0.15) + (Math.random() * 1.5);
                this.vx = Math.cos(angle) * speedMod;
                this.vy = Math.sin(angle) * speedMod;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.save();
                ctx.fillStyle = this.color === 1 ? '#ffffff' : '#000000';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                
                ctx.beginPath();
                ctx.translate(this.x, this.y);
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        // 粒子特效
        let particles = [];
        function createParticles(x, y, color, count = 5) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    size: Math.random() * 4 + 2,
                    color: color,
                    alpha: 1
                });
            }
        }

        // 屏幕震动机制
        let shakeTime = 0;
        function triggerShake(amt) { shakeTime = amt; }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.03;
                if (p.alpha <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.restore();
            });
        }

        // 游戏核心循环
        function initGame() {
            score = 0;
            scoreText.innerText = score;
            enemies = [];
            particles = [];
            player.color = 1;
            spawnTimer = 0;
            player.rotSpeed = 0.04;
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            triggerShake(30);
            createParticles(player.x, player.y, '#000000', 40);
            createParticles(player.x, player.y, '#888888', 40);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('hb_high_score_v2', highScore);
                bestText.innerText = highScore;
            }

            titleText.innerText = "GAME OVER";
            descText.innerHTML = `得分: <span style="font-size:24px;color:#000;font-weight:bold;">${score}</span><br><br>在明暗交错中，你坚持了 ${ (score*0.8).toFixed(1) } 秒。`;
            startBtn.innerText = "TRY AGAIN";
            startScreen.style.opacity = '1';
            startScreen.style.pointerEvents = 'auto';
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            player.update();

            // 敌人生成逻辑（随时间越来越密集）
            spawnTimer++;
            let currentSpawnRate = Math.max(15, baseSpawnRate - (score * 2));
            if (spawnTimer >= currentSpawnRate) {
                enemies.push(new Enemy());
                // 高分段有概率连续成对生成
                if (score > 15 && Math.random() > 0.7) {
                    setTimeout(() => { if(gameState === 'PLAYING') enemies.push(new Enemy()); }, 200);
                }
                spawnTimer = 0;
            }

            // 敌人更新与碰撞检测
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.update();

                // 计算到中心的距离 (碰撞检测)
                let dist = Math.hypot(e.x - player.x, e.y - player.y);
                
                if (dist < player.size + e.size/2) {
                    // 核心判定：颜色相同吃掉，不同死
                    if (e.color === player.color) {
                        score++;
                        scoreText.innerText = score;
                        // 加速转动，增加视觉压迫感
                        player.rotSpeed = 0.04 + (score * 0.005); 
                        triggerShake(5);
                        createParticles(e.x, e.y, e.color === 1 ? '#888888' : '#000000', 6);
                        enemies.splice(i, 1);
                    } else {
                        gameOver();
                    }
                    continue;
                }

                // 越界清除
                if (e.x < -50 || e.x > GAME_SIZE + 50 || e.y < -50 || e.y > GAME_SIZE + 50) {
                    enemies.splice(i, 1);
                }
            }

            updateParticles();
        }

        function draw() {
            // 背景底色改为纯白
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, GAME_SIZE, GAME_SIZE);

            ctx.save();
            // 屏幕震动效果
            if (shakeTime > 0) {
                let dx = (Math.random() - 0.5) * shakeTime;
                let dy = (Math.random() - 0.5) * shakeTime;
                ctx.translate(dx, dy);
                shakeTime *= 0.9; // 震动衰减
                if (shakeTime < 0.5) shakeTime = 0;
            }

            // 绘制网格背景（浅灰色细线）
            ctx.strokeStyle = 'rgba(0,0,0,0.03)';
            ctx.lineWidth = 1;
            for(let i = 0; i < GAME_SIZE; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, GAME_SIZE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(GAME_SIZE, i); ctx.stroke();
            }

            // 绘制游戏元素
            enemies.forEach(e => e.draw());
            player.draw();
            drawParticles();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // 操作响应
        function triggerSwitch() {
            if (gameState === 'PLAYING') {
                player.switch();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'PLAYING') triggerSwitch();
                else if (gameState === 'START' || gameState === 'GAMEOVER') startBtn.click();
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            triggerSwitch();
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerSwitch();
        });

        startBtn.addEventListener('click', () => {
            initGame();
            gameState = 'PLAYING';
            startScreen.style.opacity = '0';
            startScreen.style.pointerEvents = 'none';
        });

        // 启动循环
        loop();
    </script>
</body>
</html>
